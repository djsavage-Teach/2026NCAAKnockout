<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA Knockout 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Custom SVG Icon component to avoid DOM manipulation conflicts with React 18
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                trophy: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>,
                mail: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
                "arrow-right": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>,
                "chevron-left": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"></path></svg>,
                "loader-2": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>,
                "refresh-cw": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>,
                "alert-circle": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>,
                "check-circle-2": <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>
            };
            return icons[name] || null;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOR2x-zTfjI82vkUdJSzlPQCcK4hdzBg0xdl04-zPwme_U8X6aAt797TRaHOF7TWmyWw/exec";

        const App = () => {
            const [view, setView] = useState('initial'); 
            const [loading, setLoading] = useState(false);
            const [syncing, setSyncing] = useState(false);
            const [user, setUser] = useState(null);
            const [userPicks, setUserPicks] = useState({});
            const [allTeamsData, setAllTeamsData] = useState([]); 
            const [availableTeams, setAvailableTeams] = useState([]); 
            const [selectedRound, setSelectedRound] = useState('');
            const [selections, setSelections] = useState({ team1: '', team2: '' });
            const [formData, setFormData] = useState({ email: '', password: '', username: '' });
            const [message, setMessage] = useState(null);

            const rounds = [
                { id: 'R64', label: 'Round of 64', slots: 2, statusCol: 'R64' },
                { id: 'R32', label: 'Round of 32', slots: 2, statusCol: 'R32' },
                { id: 'S16', label: 'Sweet 16', slots: 2, statusCol: 'S16' },
                { id: 'E8', label: 'Elite Eight', slots: 1, statusCol: 'E8' },
                { id: 'F4', label: 'Final Four', slots: 1, statusCol: 'F4' },
                { id: 'CHAMP', label: 'Championship', slots: 1, statusCol: 'CHAMP' },
            ];

            const getTeamName = (teamObj) => {
                if (!teamObj) return "";
                return teamObj.Team || teamObj.team || teamObj.TEAM || Object.values(teamObj)[0] || "Unknown Team";
            };

            const filterTeamsForRound = useCallback((roundId, data) => {
                const roundConfig = rounds.find(r => r.id === roundId);
                if (!roundConfig || !data || !Array.isArray(data)) return;
                const filtered = data.filter(team => {
                    const statusValue = team[roundConfig.statusCol] || team[roundConfig.statusCol.toLowerCase()] || team[roundConfig.statusCol.toUpperCase()];
                    return statusValue && statusValue.toString().trim().toLowerCase() === 'active';
                });
                setAvailableTeams(filtered);

                if (userPicks[roundId]) {
                    setSelections({
                        team1: userPicks[roundId][0] || '',
                        team2: userPicks[roundId][1] || ''
                    });
                } else {
                    setSelections({ team1: '', team2: '' });
                }
            }, [userPicks]);

            const loadAllTeams = async () => {
                setSyncing(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getTeams&t=${Date.now()}`);
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        setAllTeamsData(data);
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                } finally {
                    setSyncing(false);
                }
            };

            useEffect(() => {
                const savedUser = localStorage.getItem('knockout_user');
                if (savedUser) {
                    const parsed = JSON.parse(savedUser);
                    setUser(parsed);
                    setView('dashboard');
                    loadAllTeams();
                }
            }, []);

            useEffect(() => {
                if (selectedRound) filterTeamsForRound(selectedRound, allTeamsData);
            }, [selectedRound, allTeamsData, filterTeamsForRound]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage(null);
                try {
                    const url = `${SCRIPT_URL}?action=login&email=${encodeURIComponent(formData.email)}&password=${encodeURIComponent(formData.password)}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    if (result.success) {
                        const userData = { username: result.userName, email: formData.email };
                        setUser(userData);
                        setUserPicks(result.picks || {});
                        localStorage.setItem('knockout_user', JSON.stringify(userData));
                        setView('dashboard');
                        loadAllTeams();
                    } else {
                        setMessage({ type: 'error', text: "Invalid email or password." });
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: "Server connection failed." });
                } finally {
                    setLoading(false);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage(null);
                try {
                    const url = `${SCRIPT_URL}?action=register&email=${encodeURIComponent(formData.email)}&password=${encodeURIComponent(formData.password)}&name=${encodeURIComponent(formData.username)}`;
                    const response = await fetch(url, { method: 'POST' });
                    const result = await response.json();
                    if (result.success) {
                        const userData = { username: formData.username, email: formData.email };
                        setUser(userData);
                        setUserPicks({});
                        localStorage.setItem('knockout_user', JSON.stringify(userData));
                        setView('dashboard');
                        loadAllTeams();
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: 'Registration failed.' });
                } finally {
                    setLoading(false);
                }
            };

            const handlePickSubmit = async () => {
                const roundConfig = rounds.find(r => r.id === selectedRound);
                const needsTwo = roundConfig.slots === 2;
                const hasRequiredPicks = needsTwo ? (selections.team1 && selections.team2) : selections.team1;

                if (!selectedRound || !hasRequiredPicks) {
                    setMessage({ type: 'error', text: needsTwo ? 'Please select both teams.' : 'Please select a team.' });
                    return;
                }
                setLoading(true);
                try {
                    const url = `${SCRIPT_URL}?action=submitPick&userName=${encodeURIComponent(user.username)}&round=${selectedRound}&team1=${encodeURIComponent(selections.team1)}&team2=${encodeURIComponent(selections.team2)}`;
                    await fetch(url, { method: 'POST', mode: 'no-cors' });
                    
                    setUserPicks(prev => ({
                        ...prev,
                        [selectedRound]: [selections.team1, selections.team2]
                    }));

                    setMessage({ type: 'success', text: `Picks for ${selectedRound} updated successfully!` });
                } catch (err) {
                    setMessage({ type: 'error', text: 'Failed to submit.' });
                } finally {
                    setLoading(false);
                }
            };

            const renderInitialView = () => (
                <div className="space-y-4">
                    <button onClick={() => setView('login')} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <Icon name="mail" /> Login <Icon name="arrow-right" />
                    </button>
                    <button onClick={() => setView('register')} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-5 rounded-xl border border-slate-700 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <Icon name="user" className="w-5 h-5 text-indigo-400" /> Register
                    </button>
                </div>
            );

            const renderFormView = () => (
                <form onSubmit={view === 'register' ? handleRegister : handleLogin} className="space-y-5">
                    <button type="button" onClick={() => setView('initial')} className="flex items-center gap-2 text-slate-500 hover:text-indigo-400 text-xs font-bold uppercase mb-2">
                        <Icon name="chevron-left" className="w-4 h-4" /> Back
                    </button>
                    {view === 'register' && (
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Full Name</label>
                            <input type="text" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-indigo-500" onChange={(e) => setFormData({...formData, username: e.target.value})} />
                        </div>
                    )}
                    <div className="space-y-1">
                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Email</label>
                        <input type="email" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-indigo-500" onChange={(e) => setFormData({...formData, email: e.target.value})} />
                    </div>
                    <div className="space-y-1">
                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Password</label>
                        <input type="password" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-indigo-500" onChange={(e) => setFormData({...formData, password: e.target.value})} />
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 mt-4 disabled:opacity-50 active:scale-95 transition-transform">
                        {loading ? <Icon name="loader-2" /> : "Submit"}
                    </button>
                </form>
            );

            const renderDashboard = () => (
                <div className="space-y-6">
                    <div className="flex items-center justify-between bg-slate-800/40 p-4 rounded-2xl border border-slate-700">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-lg">
                                {user?.username?.[0]?.toUpperCase()}
                            </div>
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-tighter leading-none mb-1">Manager</p>
                                <p className="text-sm font-semibold truncate max-w-[120px]">{user?.username}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={loadAllTeams} disabled={syncing} title="Sync Teams">
                                <Icon name="refresh-cw" className={`w-4 h-4 text-slate-500 ${syncing ? 'animate-spin' : ''}`} />
                            </button>
                            <button onClick={() => { localStorage.removeItem('knockout_user'); setUser(null); setUserPicks({}); setView('initial'); }} className="text-[10px] font-black text-rose-500 uppercase border border-rose-500/20 px-2 py-1 rounded-lg">Sign Out</button>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Tournament Progress</h2>
                        <div className="grid grid-cols-2 gap-2">
                            {rounds.map((r) => (
                                <button key={r.id} onClick={() => { setSelectedRound(r.id); setMessage(null); }} className={`py-3 px-2 rounded-xl font-bold text-[11px] transition-all border flex flex-col items-center gap-1 ${selectedRound === r.id ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg shadow-indigo-500/20' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                                    <span>{r.label}</span>
                                    {userPicks[r.id] && <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>}
                                </button>
                            ))}
                        </div>
                    </div>

                    {selectedRound && (
                        <div className="p-5 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl space-y-4">
                            <div className="flex items-center justify-between">
                                <h3 className="font-black italic uppercase text-indigo-400 text-sm tracking-wider">
                                    {rounds.find(r => r.id === selectedRound).label}
                                </h3>
                                {userPicks[selectedRound] ? (
                                    <span className="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">Saved Pick</span>
                                ) : (
                                    <span className="text-[9px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">Empty</span>
                                )}
                            </div>
                            <div className="space-y-3">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">First Pick</label>
                                    <select value={selections.team1} onChange={(e) => setSelections({...selections, team1: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-sm text-white outline-none focus:border-indigo-500 appearance-none">
                                        <option value="">-- Select Team --</option>
                                        {availableTeams.map((t, idx) => <option key={`t1-${idx}`} value={getTeamName(t)}>{getTeamName(t)}</option>)}
                                    </select>
                                </div>
                                {(rounds.find(r => r.id === selectedRound).slots === 2) && (
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Second Pick</label>
                                        <select value={selections.team2} onChange={(e) => setSelections({...selections, team2: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-sm text-white outline-none focus:border-indigo-500 appearance-none">
                                            <option value="">-- Select Team --</option>
                                            {availableTeams.map((t, idx) => <option key={`t2-${idx}`} value={getTeamName(t)}>{getTeamName(t)}</option>)}
                                        </select>
                                    </div>
                                )}
                                <button disabled={loading} onClick={handlePickSubmit} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black uppercase italic tracking-wider flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40 mt-4 transition-all">
                                    {loading ? <Icon name="loader-2" /> : (userPicks[selectedRound] ? "Update Selections" : "Lock In Picks")}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
                    <div className="w-full max-w-md z-10">
                        <div className="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center p-3 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
                                    <Icon name="trophy" className="w-8 h-8 text-white" />
                                </div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase italic leading-none">
                                    Knockout <span className="text-indigo-500">2026</span>
                                </h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-2 tracking-[0.3em]">Official Entry Portal</p>
                            </div>
                            {message && (
                                <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 border ${message.type === 'success' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20'}`}>
                                    <Icon name={message.type === 'error' ? 'alert-circle' : 'check-circle-2'} className="w-5 h-5 shrink-0" />
                                    <span className="text-sm font-medium">{message.text}</span>
                                </div>
                            )}
                            {view === 'dashboard' ? renderDashboard() : (view === 'initial' ? renderInitialView() : renderFormView())}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
