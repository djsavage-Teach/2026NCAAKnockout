<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA Knockout 2026</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Icons Component Wrapper for Lucide
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQmqU4XK7wbG7t7eS2rWZ-4y87qB-QzdR1lOoYjYl4okJxRq2G6VIBbBk4AE6j1DDEzw/exec";

        const App = () => {
            const [view, setView] = useState('initial'); 
            const [loading, setLoading] = useState(false);
            const [syncing, setSyncing] = useState(false);
            const [user, setUser] = useState(null);
            const [allTeamsData, setAllTeamsData] = useState([]); 
            const [availableTeams, setAvailableTeams] = useState([]); 
            const [selectedRound, setSelectedRound] = useState('');
            const [selections, setSelections] = useState({ team1: '', team2: '' });
            const [formData, setFormData] = useState({ email: '', password: '', username: '' });
            const [message, setMessage] = useState(null);

            const rounds = [
                { id: 'R64', label: 'Round of 64', slots: 2, statusCol: 'R64' },
                { id: 'R32', label: 'Round of 32', slots: 1, statusCol: 'R32' },
                { id: 'S16', label: 'Sweet 16', slots: 1, statusCol: 'S16' },
                { id: 'E8', label: 'Elite Eight', slots: 1, statusCol: 'E8' },
                { id: 'F4', label: 'Final Four', slots: 1, statusCol: 'F4' },
                { id: 'CHAMP', label: 'Championship', slots: 1, statusCol: 'CHAMP' },
            ];

            const getTeamName = (teamObj) => {
                if (!teamObj) return "";
                return teamObj.Team || teamObj.team || teamObj.TEAM || Object.values(teamObj)[0] || "Unknown Team";
            };

            const filterTeamsForRound = useCallback((roundId, data) => {
                const roundConfig = rounds.find(r => r.id === roundId);
                if (!roundConfig || !data || !Array.isArray(data)) return;
                const filtered = data.filter(team => {
                    const statusValue = team[roundConfig.statusCol] || team[roundConfig.statusCol.toLowerCase()] || team[roundConfig.statusCol.toUpperCase()];
                    return statusValue && statusValue.toString().trim().toLowerCase() === 'active';
                });
                setAvailableTeams(filtered);
            }, []);

            const loadAllTeams = async () => {
                setSyncing(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getTeams&t=${Date.now()}`);
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        setAllTeamsData(data);
                        if (selectedRound) filterTeamsForRound(selectedRound, data);
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                } finally {
                    setSyncing(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            useEffect(() => {
                const savedUser = localStorage.getItem('knockout_user');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                    setView('dashboard');
                    loadAllTeams();
                }
                lucide.createIcons();
            }, []);

            useEffect(() => {
                if (selectedRound) filterTeamsForRound(selectedRound, allTeamsData);
            }, [selectedRound, allTeamsData, filterTeamsForRound]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage(null);
                try {
                    const url = `${SCRIPT_URL}?action=login&email=${encodeURIComponent(formData.email)}&password=${encodeURIComponent(formData.password)}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    if (result.success) {
                        const userData = { username: result.userName, email: formData.email };
                        setUser(userData);
                        localStorage.setItem('knockout_user', JSON.stringify(userData));
                        setView('dashboard');
                        loadAllTeams();
                    } else {
                        setMessage({ type: 'error', text: "Invalid email or password." });
                    }
                } catch (err) {
                    setMessage({ type: 'error', text: "Server connection failed." });
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setLoading(true);
                setMessage(null);
                try {
                    const url = `${SCRIPT_URL}?action=register&email=${encodeURIComponent(formData.email)}&password=${encodeURIComponent(formData.password)}&name=${encodeURIComponent(formData.username)}`;
                    const response = await fetch(url, { method: 'POST' });
                    const result = await response.json();
                    if (result.success) {
                        const userData = { username: formData.username, email: formData.email };
                        setUser(userData);
                        localStorage.setItem('knockout_user', JSON.stringify(userData));
                        setView('dashboard');
                        loadAllTeams();
                    }
                } catch (err) {
                    const userData = { username: formData.username, email: formData.email };
                    setUser(userData);
                    localStorage.setItem('knockout_user', JSON.stringify(userData));
                    setView('dashboard');
                    loadAllTeams();
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            const handlePickSubmit = async () => {
                const isR64 = selectedRound === 'R64';
                const hasRequiredPicks = isR64 ? (selections.team1 && selections.team2) : selections.team1;
                if (!selectedRound || !hasRequiredPicks) {
                    setMessage({ type: 'error', text: 'Please complete all selections.' });
                    return;
                }
                setLoading(true);
                try {
                    const url = `${SCRIPT_URL}?action=submitPick&userName=${encodeURIComponent(user.username)}&round=${selectedRound}&team1=${encodeURIComponent(selections.team1)}&team2=${encodeURIComponent(selections.team2)}`;
                    await fetch(url, { method: 'POST', mode: 'no-cors' });
                    setMessage({ type: 'success', text: `Picks for ${selectedRound} locked in!` });
                    setSelections({ team1: '', team2: '' });
                    setSelectedRound('');
                } catch (err) {
                    setMessage({ type: 'error', text: 'Failed to submit.' });
                } finally {
                    setLoading(false);
                }
            };

            // Re-initialize icons when view changes
            useEffect(() => { lucide.createIcons(); }, [view, selectedRound, message]);

            const renderInitialView = () => (
                <div className="space-y-4">
                    <button onClick={() => setView('login')} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <Icon name="mail" className="w-5 h-5" /> Login <Icon name="arrow-right" className="w-5 h-5" />
                    </button>
                    <button onClick={() => setView('register')} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-5 rounded-xl border border-slate-700 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                        <Icon name="user" className="w-5 h-5 text-indigo-400" /> Register
                    </button>
                </div>
            );

            const renderFormView = () => (
                <form onSubmit={view === 'register' ? handleRegister : handleLogin} className="space-y-5">
                    <button type="button" onClick={() => setView('initial')} className="flex items-center gap-2 text-slate-500 hover:text-indigo-400 text-xs font-bold uppercase mb-2">
                        <Icon name="chevron-left" className="w-4 h-4" /> Back
                    </button>
                    {view === 'register' && (
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Full Name</label>
                            <input type="text" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none" onChange={(e) => setFormData({...formData, username: e.target.value})} />
                        </div>
                    )}
                    <div className="space-y-1">
                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Email</label>
                        <input type="email" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none" onChange={(e) => setFormData({...formData, email: e.target.value})} />
                    </div>
                    <div className="space-y-1">
                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Password</label>
                        <input type="password" required className="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 px-4 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none" onChange={(e) => setFormData({...formData, password: e.target.value})} />
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold uppercase tracking-widest flex items-center justify-center gap-2 mt-4 active:scale-95 disabled:opacity-50">
                        {loading ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : "Submit"}
                    </button>
                </form>
            );

            const renderDashboard = () => (
                <div className="space-y-6">
                    <div className="flex items-center justify-between bg-slate-800/40 p-4 rounded-2xl border border-slate-700 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-lg">
                                {user?.username?.[0]?.toUpperCase()}
                            </div>
                            <div>
                                <p className="text-xs font-bold text-slate-500 uppercase">Manager</p>
                                <p className="text-sm font-medium">{user?.username}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={loadAllTeams} disabled={syncing}>
                                <Icon name="refresh-cw" className={`w-4 h-4 text-slate-500 ${syncing ? 'animate-spin' : ''}`} />
                            </button>
                            <button onClick={() => { localStorage.removeItem('knockout_user'); setUser(null); setView('initial'); }} className="text-xs font-bold text-rose-500 uppercase">Exit</button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h2 className="text-sm font-bold uppercase tracking-widest text-slate-300">Choose Round</h2>
                        <div className="grid grid-cols-2 gap-2">
                            {rounds.map((r) => (
                                <button key={r.id} onClick={() => { setSelectedRound(r.id); setSelections({ team1: '', team2: '' }); setMessage(null); }} className={`py-3 rounded-xl font-bold text-xs transition-all border ${selectedRound === r.id ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg shadow-indigo-500/20' : 'bg-slate-800/50 border-slate-700 text-slate-400'}`}>
                                    {r.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {selectedRound && (
                        <div className="p-5 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl space-y-4">
                            <div className="flex items-center justify-between mb-2">
                                <h3 className="font-black italic uppercase text-indigo-400">{rounds.find(r => r.id === selectedRound).label}</h3>
                                <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-indigo-500/20 text-white uppercase tracking-tighter">
                                    {availableTeams.length} Active Teams
                                </span>
                            </div>
                            <div className="space-y-3">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Selection #1</label>
                                    <select value={selections.team1} onChange={(e) => setSelections({...selections, team1: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                                        <option value="">-- Choose Team --</option>
                                        {availableTeams.map((t, idx) => <option key={`t1-${idx}`} value={getTeamName(t)}>{getTeamName(t)}</option>)}
                                    </select>
                                </div>
                                {selectedRound === 'R64' && (
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase text-slate-500 ml-1">Selection #2</label>
                                        <select value={selections.team2} onChange={(e) => setSelections({...selections, team2: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-4 text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                                            <option value="">-- Choose Team --</option>
                                            {availableTeams.map((t, idx) => <option key={`t2-${idx}`} value={getTeamName(t)}>{getTeamName(t)}</option>)}
                                        </select>
                                    </div>
                                )}
                                <button disabled={loading} onClick={handlePickSubmit} className="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black uppercase italic tracking-wider flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40 mt-4">
                                    {loading ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : "Lock In Picks"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
                    <div className="w-full max-w-md z-10">
                        <div className="bg-slate-900/50 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl relative">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center p-3 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/20">
                                    <Icon name="trophy" className="w-8 h-8 text-white" />
                                </div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase italic leading-none">
                                    Knockout <span className="text-indigo-500">2026</span>
                                </h1>
                            </div>
                            {message && (
                                <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 border ${message.type === 'success' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20'}`}>
                                    <Icon name={message.type === 'error' ? 'alert-circle' : 'check-circle-2'} className="w-5 h-5 shrink-0" />
                                    <span className="text-sm font-medium">{message.text}</span>
                                </div>
                            )}
                            {view === 'dashboard' ? renderDashboard() : (view === 'initial' ? renderInitialView() : renderFormView())}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
